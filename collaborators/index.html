<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CENT collaborations — exclusive collections with Rwanda's best brands.">
  <title>Collaborations — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
  <style>
    .collabs-header {
      padding: var(--space-16) 0 var(--space-8);
      text-align: center;
    }
    .collabs-eyebrow {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-3);
    }
    .collabs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-6);
      padding-bottom: var(--space-16);
    }
    @media (max-width: 767px) { .collabs-grid { grid-template-columns: 1fr; gap: var(--space-4); } }
    .collab-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition), border-color var(--transition);
    }
    .collab-card:hover { transform: translateY(-2px); border-color: var(--text-muted); }
    .collab-banner {
      width: 100%;
      aspect-ratio: 16/6;
      object-fit: cover;
      background: var(--bg-hover);
      display: block;
    }
    .collab-banner-placeholder {
      width: 100%;
      aspect-ratio: 16/6;
      background: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .collab-card-body {
      padding: var(--space-5) var(--space-6) var(--space-6);
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
    }
    .collab-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .collab-info { flex: 1; min-width: 0; }
    .collab-name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
    }
    .collab-brand {
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .collab-desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-top: var(--space-3);
      line-height: 1.6;
    }
    .collab-cta {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }
    .collab-cta::after { content: '→'; transition: transform var(--transition); }
    .collab-card:hover .collab-cta::after { transform: translateX(4px); }
  </style>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0a0a0a"></head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container">
      <div class="collabs-header">
        <div class="collabs-eyebrow">Limited Drops</div>
        <h1 style="font-size:var(--text-4xl);font-weight:900">Collaborations</h1>
        <p style="color:var(--text-muted);margin-top:var(--space-3);font-size:var(--text-base)">
          CENT × Rwanda's finest — exclusive collections, made together.
        </p>
      </div>

      <div id="collabs-grid" class="collabs-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="../js/pages/collaborators.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
