<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: var(--space-8);
      padding: var(--space-8) 0 var(--space-16);
      align-items: start;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .cart-item-img { width: 88px; height: 117px; object-fit: cover; border-radius: var(--radius); background: var(--bg-card); }
    .cart-item-name { font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-1); }
    .cart-item-variant { font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-3); }
    .cart-item-price { font-size: var(--text-sm); font-weight: 700; }
    .cart-item-total { font-size: var(--text-base); font-weight: 800; text-align: right; }
    .remove-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; transition: color var(--transition); padding: 2px 4px;
    }
    .remove-btn:hover { color: var(--error); }
    @media (max-width: 1023px) { .cart-layout { grid-template-columns: 1fr; } }
    @media (max-width: 639px) {
      .cart-item { grid-template-columns: 72px 1fr auto; gap: var(--space-3); }
      .cart-item-img { width: 72px; height: 96px; }
    }
  </style>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0a0a0a"></head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container">
      <div class="page-header">
        <div class="breadcrumb">
          <a href="/">Home</a>
          <span class="sep">›</span>
          <span>Cart</span>
        </div>
        <h1>Your Cart</h1>
      </div>
      <div id="cart-wrapper">
        <div class="spinner-page"><div class="spinner-lg"></div></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="../js/pages/cart.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
