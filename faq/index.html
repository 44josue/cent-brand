<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
<link rel="manifest" href="../manifest.json"><meta name="theme-color" content="#0a0a0a"></head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container" style="max-width:var(--content-width);padding-top:var(--space-12);padding-bottom:var(--space-16)">
      <div class="breadcrumb" style="margin-bottom:var(--space-6)">
        <a href="/">Home</a>
        <span class="sep">›</span>
        <span>FAQ</span>
      </div>
      <h1 style="margin-bottom:var(--space-2)">Frequently Asked Questions</h1>
      <p style="margin-bottom:var(--space-8)">Everything you need to know about CENT.</p>

      <div id="faq-list">
        ${Array(5).fill(`
          <div style="padding:var(--space-4) 0;border-bottom:1px solid var(--border)">
            <div class="skeleton skeleton-text" style="width:70%;margin-bottom:var(--space-2)"></div>
            <div class="skeleton skeleton-text" style="width:40%"></div>
          </div>
        `).join('')}
      </div>

      <div style="margin-top:var(--space-12);padding:var(--space-6);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);text-align:center">
        <h3 style="margin-bottom:var(--space-2)">Still have questions?</h3>
        <p style="margin-bottom:var(--space-4)">We're here to help.</p>
        <a href="/contact/" class="btn btn-primary">Contact Us</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="../js/pages/faq.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
