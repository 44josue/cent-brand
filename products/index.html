<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop all CENT streetwear products — Rwanda's finest.">
  <title>Products — CENT</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/footer.css">
  <style>
    .collabs-strip {
      display: flex;
      gap: var(--space-3);
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .collabs-strip::-webkit-scrollbar { display: none; }
    .collab-chip {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: var(--bg-surface);
      cursor: pointer;
      white-space: nowrap;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      flex-shrink: 0;
      text-decoration: none;
    }
    .collab-chip:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .collab-chip.active { border-color: var(--text-primary); background: var(--text-primary); color: var(--text-inverse); }
    .collab-chip img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
    .collab-strip-label {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      margin-bottom: var(--space-3);
    }
    .products-layout {
      display: flex;
      gap: var(--space-8);
      align-items: flex-start;
      padding: var(--space-8) 0 var(--space-16);
    }
    .products-main { flex: 1; min-width: 0; }
    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
      gap: var(--space-3);
    }
    .sort-bar .count { font-size: var(--text-sm); color: var(--text-muted); }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    @media (max-width: 1279px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 639px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-2); } }
    .filter-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 799;
    }
    .filter-overlay.open { display: block; }
  </style>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0a0a0a"></head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container">
      <div class="page-header">
        <div class="breadcrumb">
          <a href="/">Home</a>
          <span class="sep">›</span>
          <span>Products</span>
        </div>
        <h1 id="page-title">All Products</h1>
      </div>

      <!-- Collaborations strip — only shown when collabs exist -->
      <div id="collabs-strip" style="display:none;margin-bottom:var(--space-6)"></div>

      <div class="products-layout">
        <div class="filter-overlay" id="filter-overlay"></div>
        <aside class="filter-sidebar" id="filter-sidebar" aria-label="Filters">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4)">
            <h3 style="font-size:var(--text-base)">Filters</h3>
            <button class="btn btn-ghost btn-sm" id="clear-filters">Clear All</button>
          </div>

          <div class="filter-section">
            <h4>Category</h4>
            <div id="category-filters"><div class="skeleton skeleton-text"></div></div>
          </div>

          <div class="filter-section">
            <h4>Collection</h4>
            <div id="collection-filters"><div class="skeleton skeleton-text"></div></div>
          </div>

          <div class="filter-section">
            <h4>Collaboration</h4>
            <div id="collab-filters"><div class="skeleton skeleton-text"></div></div>
          </div>

          <div class="filter-section">
            <h4>Size</h4>
            <div style="display:flex;flex-wrap:wrap;gap:var(--space-2)" id="size-filters">
              <div class="skeleton skeleton-text"></div>
            </div>
          </div>

          <div class="filter-section">
            <h4>Price Range (RWF)</h4>
            <div style="display:flex;gap:var(--space-2);align-items:center">
              <input type="number" class="input input-sm" id="price-min" placeholder="Min" min="0" step="1000">
              <span style="color:var(--text-muted)">–</span>
              <input type="number" class="input input-sm" id="price-max" placeholder="Max" min="0" step="1000">
            </div>
          </div>

          <div class="filter-section">
            <label class="toggle">
              <input type="checkbox" id="in-stock-toggle">
              <div class="toggle-track"><div class="toggle-thumb"></div></div>
              In stock only
            </label>
          </div>

          <button class="btn btn-primary w-full" id="apply-filters-btn" style="margin-top:var(--space-4)">Apply Filters</button>
        </aside>

        <div class="products-main">
          <div class="sort-bar">
            <div style="display:flex;align-items:center;gap:var(--space-3)">
              <button class="btn btn-secondary btn-sm" id="mobile-filter-btn">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h5.25m5.25-.75L17.25 9m0 0L21 12.75M17.25 9v12"/>
                </svg>
                Filters
              </button>
              <span class="count" id="product-count">Loading...</span>
            </div>
            <select class="input" style="width:auto" id="sort-select" aria-label="Sort products">
              <option value="newest">Newest</option>
              <option value="featured">Featured</option>
              <option value="price_asc">Price: Low → High</option>
              <option value="price_desc">Price: High → Low</option>
            </select>
          </div>

          <div class="products-grid" id="products-grid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
          </div>

          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="/js/pages/products.js"></script>
<script type="module" src="/js/lib/sw-register.js"></script></body>
</html>
