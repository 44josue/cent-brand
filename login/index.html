<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
  <style>
    .auth-page {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
    }
    .auth-logo {
      font-size: var(--text-3xl);
      font-weight: 900;
      letter-spacing: -0.04em;
      text-align: center;
      margin-bottom: var(--space-2);
      display: block;
    }
    .auth-tagline {
      text-align: center;
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }
    .divider-text {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-4) 0;
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .divider-text::before, .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
<link rel="manifest" href="../manifest.json"><link rel="apple-touch-icon" href="../icons/icon-192.png"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#0a0a0a">  <link rel="icon" type="image/x-icon" href="../assets/images/icon.png">
</head>
<body>
  <div id="nav-placeholder">
    <!-- Static fallback nav — shown until nav.js hydrates it with the full interactive version
         (cart badge, search, theme toggle, auth state, mobile menu). Keeps the navbar visible
         even if the script fails to load (e.g. viewing this file directly instead of via a server). -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar-inner">
        <ul class="nav-left nav-links" role="list">
          <li><a href="../">Home</a></li>
          <li><a href="../products/">Shop</a></li>
          <li><a href="../about/">About</a></li>
        </ul>

        <a href="../" class="nav-logo" aria-label="CENT Home">
          <img src="../assets/images/black logo.png" alt="CENT" class="nav-logo-img nav-logo-dark">
          <img src="../assets/images/white logo.png" alt="CENT" class="nav-logo-img nav-logo-light">
        </a>

        <div class="nav-right">
          <ul class="nav-links" role="list">
            <li><a href="../contact/">Contact</a></li>
          </ul>
          <div class="nav-actions">
            <button class="nav-icon-btn" aria-label="Search" title="Search">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
              </svg>
            </button>
            <button class="nav-icon-btn" aria-label="Toggle theme">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
              </svg>
            </button>
            <a href="../cart/" class="nav-icon-btn" aria-label="Cart">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>
              </svg>
            </a>
            <a href="../account/" class="nav-icon-btn" aria-label="Account">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
              </svg>
            </a>
            <button class="hamburger" aria-label="Open menu">
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../" class="auth-logo">cent</a>
      <p class="auth-tagline">Every Cent Matters</p>

      <div class="tabs" style="margin-bottom:var(--space-6)">
        <button class="tab-btn active" data-tab="signin">Sign In</button>
        <button class="tab-btn" data-tab="signup">Create Account</button>
      </div>

      <!-- Sign In -->
      <div class="tab-panel active" id="tab-signin">
        <form id="signin-form" novalidate>
          <div style="display:flex;flex-direction:column;gap:var(--space-4)">
            <div class="input-group">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" class="input" placeholder="you@example.com" autocomplete="email" required>
              <span class="error-msg">Valid email required.</span>
            </div>
            <div class="input-group">
              <label for="signin-password" style="display:flex;justify-content:space-between">
                Password
                <button type="button" id="forgot-btn" style="font-size:var(--text-xs);color:var(--text-muted);background:none;border:none;cursor:pointer;text-decoration:underline">Forgot?</button>
              </label>
              <input type="password" id="signin-password" class="input" placeholder="••••••••" autocomplete="current-password" required>
              <span class="error-msg">Password required.</span>
            </div>
            <div id="signin-error" class="hidden" style="font-size:var(--text-sm);color:var(--error);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:var(--space-3)"></div>
            <button type="submit" class="btn btn-primary btn-lg w-full" id="signin-btn">Sign In</button>
          </div>
        </form>

        <div style="text-align:center;margin-top:var(--space-4)">
          <a href="../" style="font-size:var(--text-sm);color:var(--text-muted)">Continue as Guest →</a>
        </div>
      </div>

      <!-- Create Account -->
      <div class="tab-panel" id="tab-signup">
        <form id="signup-form" novalidate>
          <div style="display:flex;flex-direction:column;gap:var(--space-4)">
            <div class="input-group">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" class="input" placeholder="Jean Pierre Habimana" autocomplete="name" required>
              <span class="error-msg">Full name required.</span>
            </div>
            <div class="input-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" class="input" placeholder="you@example.com" autocomplete="email" required>
              <span class="error-msg">Valid email required.</span>
            </div>
            <div class="input-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" class="input" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
              <span class="error-msg">Password must be at least 8 characters.</span>
            </div>
            <div class="input-group">
              <label for="signup-confirm">Confirm Password</label>
              <input type="password" id="signup-confirm" class="input" placeholder="••••••••" autocomplete="new-password" required>
              <span class="error-msg">Passwords must match.</span>
            </div>
            <div id="signup-error" class="hidden" style="font-size:var(--text-sm);color:var(--error);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:var(--space-3)"></div>
            <button type="submit" class="btn btn-primary btn-lg w-full" id="signup-btn">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/pages/login.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
