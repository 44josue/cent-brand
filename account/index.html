<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0a0a0a">  <link rel="icon" type="image/x-icon" href="/assets/images/icon.png">
</head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container" style="padding-top:var(--space-8);padding-bottom:var(--space-16)">
      <div id="account-page">
        <div class="spinner-page"><div class="spinner-lg"></div></div>
      </div>
    </div>
  </main>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay hidden" id="edit-profile-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="modal-close" aria-label="Close">✕</button>
      </div>
      <form id="edit-profile-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="input-group">
          <label for="edit-name">Full Name</label>
          <input type="text" id="edit-name" class="input" required>
        </div>
        <div class="input-group">
          <label for="edit-phone">Phone</label>
          <input type="tel" id="edit-phone" class="input" placeholder="+250 7XX XXX XXX">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('edit-profile-modal').classList.add('hidden')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="../js/pages/account.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
