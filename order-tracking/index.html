<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — CENT</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
  <style>
    .tracking-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--space-8);
      padding: var(--space-8) 0 var(--space-16);
      align-items: start;
    }
    .order-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .realtime-indicator {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--success);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .realtime-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @media (max-width: 1023px) { .tracking-layout { grid-template-columns: 1fr; } }
  </style>
<link rel="manifest" href="../manifest.json"><meta name="theme-color" content="#0a0a0a">  <link rel="icon" type="image/x-icon" href="/assets/images/icon.png">
</head>
<body>
  <div id="announcement-bar"></div>
  <div id="nav-placeholder"></div>

  <main>
    <div class="container">
      <div style="padding-top:var(--space-6)" id="tracking-page">
        <div class="spinner-page"><div class="spinner-lg"></div></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>
  <script type="module" src="../js/pages/order-tracking.js"></script>
<script type="module" src="../js/lib/sw-register.js"></script></body>
</html>
